# For local dev: supabase start
# Docs: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "https://styll.app",
  "https://*.ngrok-free.app",
  "https://*.ngrok-free.dev",
  "https://*.ngrok-free.app/tenant/app/*/auth/callback",
  "https://*.ngrok-free.dev/tenant/app/*/auth/callback",
  "http://192.168.1.51:3000",
  "http://192.168.1.51:3000/tenant/app/*/auth/callback",
  "http://localhost:3000/tenant/app/*/auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
auth_token = "env(TWILIO_AUTH_TOKEN)"
