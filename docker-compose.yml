version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-styll}
      POSTGRES_USER: ${POSTGRES_USER:-styll}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./symfony-app/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-styll} -d ${POSTGRES_DB:-styll}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PHP-FPM (Symfony) ────────────────────────────────────────────
  php:
    build:
      context: ./symfony-app
      dockerfile: ../docker/php/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-styll}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-styll}?serverVersion=16&charset=utf8
      JWT_SECRET_KEY: /var/www/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:?JWT_PASSPHRASE is required}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-}
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL:-http://localhost:3001/.well-known/mercure}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:?MERCURE_JWT_SECRET is required}
    volumes:
      - ./symfony-app:/var/www
      - jwt_keys:/var/www/config/jwt
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Nginx (web server / reverse proxy) ───────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./symfony-app/public:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  # ─── Mercure (realtime / SSE) ─────────────────────────────────────
  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ':3001'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:?MERCURE_JWT_SECRET is required}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:?MERCURE_JWT_SECRET is required}
      ALLOW_ANONYMOUS: '0'
      CORS_ORIGINS: ${MERCURE_CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - mercure_data:/data
      - mercure_config:/config

volumes:
  postgres_data:
  mercure_data:
  mercure_config:
  jwt_keys:
