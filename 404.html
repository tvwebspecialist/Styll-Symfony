<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Styll</title>

  <!-- Google Fonts: Anton (display numerals) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
      background: #F5F0EB;
      color: #222222;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Navigation ─────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      gap: 40px;
      z-index: 10;
    }

    nav a {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #222222;
      text-decoration: none;
      opacity: 0.55;
      transition: opacity 200ms ease;
    }

    nav a:hover { opacity: 1; }

    /* ─── Main layout ────────────────────────────────────── */
    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      gap: 24px;
    }

    /* ─── 404 typographic hero ───────────────────────────── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      /* allow the glyphs to breathe at the edges */
      max-width: 100vw;
      overflow: hidden;
    }

    .four {
      font-family: 'Anton', sans-serif;
      font-size: 40vw;
      line-height: 0.82;
      color: #222222;
      user-select: none;
      flex-shrink: 0;
    }

    .four-left  { animation: slideLeft  0.6s ease-out both; }
    .four-right { animation: slideRight 0.6s ease-out both; }

    /* ─── 3D face placeholder ────────────────────────────── */
    #face3d {
      width: 26vw;
      height: 26vw;
      object-fit: contain;
      flex-shrink: 0;
      /* levitation loop */
      animation: levitate 3s ease-in-out infinite;
      /* slight top offset so it optically aligns with the num baselines */
      margin-top: -2vw;
    }

    /* ─── Caption text ───────────────────────────────────── */
    .caption {
      text-align: center;
      animation: fadeUp 0.55s ease-out 0.4s both;
    }

    .caption .main-text {
      font-size: clamp(18px, 2.2vw, 26px);
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .caption .sub-text {
      font-size: clamp(13px, 1.3vw, 17px);
      font-weight: 300;
      font-style: italic;
      opacity: 0.55;
    }

    /* ─── CTA button ─────────────────────────────────────── */
    .cta {
      animation: fadeUp 0.55s ease-out 0.55s both;
      margin-top: 8px;
    }

    .cta a {
      display: inline-block;
      padding: 13px 32px;
      border: 1px solid #222222;
      color: #222222;
      background: transparent;
      text-decoration: none;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: background 240ms ease, color 240ms ease;
      cursor: pointer;
    }

    .cta a:hover {
      background: #222222;
      color: #F5F0EB;
    }

    /* ─── Keyframe animations ────────────────────────────── */
    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(-48px); }
      to   { opacity: 1; transform: translateX(0);     }
    }

    @keyframes slideRight {
      from { opacity: 0; transform: translateX(48px); }
      to   { opacity: 1; transform: translateX(0);    }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes levitate {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-8px); }
    }

    /* ─── Mobile ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      nav {
        padding: 18px 20px;
        gap: 18px;
      }

      nav a {
        font-size: 8px;
        letter-spacing: 0.15em;
      }

      .four { font-size: 36vw; }

      #face3d {
        width: 24vw;
        height: 24vw;
      }

      .cta a {
        padding: 11px 24px;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>

  <!-- ─── Navigation ─────────────────────────────────────── -->
  <nav>
    <a href="/">01/Home</a>
    <a href="/dashboard">02/Dashboard</a>
    <a href="/contatti">03/Contatti</a>
  </nav>

  <!-- ─── Main ───────────────────────────────────────────── -->
  <main>

    <!-- Typographic 404 hero: "4" · 3D image · "4" -->
    <div class="hero">
      <span class="four four-left">4</span>

      <!--
        Sostituisci src="" con il path della tua immagine 3D.
        Esempio: src="/img/face3d.png"
        L'immagine dovrebbe avere sfondo trasparente (PNG/WebP).
      -->
      <img id="face3d" src="" alt="Emoji 3D 404" />

      <span class="four four-right">4</span>
    </div>

    <!-- Caption -->
    <div class="caption">
      <p class="main-text">Pagina non trovata.</p>
      <p class="sub-text">Torna a casa, barbiere.</p>
    </div>

    <!-- CTA -->
    <div class="cta">
      <a href="/dashboard">← Torna alla dashboard</a>
    </div>

  </main>

  <script>
    // ─── Fallback: se l'immagine non carica mostra un emoji ──
    const img = document.getElementById('face3d')

    img.addEventListener('error', () => {
      // Sostituisce il <img> con uno span emoji come placeholder
      const placeholder = document.createElement('span')
      placeholder.textContent = '😢'
      placeholder.style.cssText = `
        font-size: 22vw;
        line-height: 1;
        display: inline-block;
        animation: levitate 3s ease-in-out infinite;
        flex-shrink: 0;
        margin-top: -1vw;
      `
      img.replaceWith(placeholder)
    })

    // Trigger error se src è vuoto
    if (!img.src || img.src === window.location.href) {
      img.dispatchEvent(new Event('error'))
    }
  </script>

</body>
</html>
