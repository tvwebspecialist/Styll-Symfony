# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    env(CORS_ALLOW_ORIGIN): ''
    env(BACKUP_REPORT_TOKEN): ''
    env(ADMIN_API_TOKEN): ''
    env(BACKUP_B2_KEY_ID): ''
    env(BACKUP_B2_APPLICATION_KEY): ''
    env(BACKUP_B2_REMOTE_PREFIX): 'postgres'
    env(GOOGLE_CLIENT_ID): ''
    env(GOOGLE_CLIENT_SECRET): ''
    env(FRONTEND_URL): 'http://localhost:3000'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\EventListener\CorsSubscriber:
        arguments:
            $corsAllowOrigin: '%env(CORS_ALLOW_ORIGIN)%'

    App\Controller\BackupController:
        arguments:
            $backupReportToken: '%env(BACKUP_REPORT_TOKEN)%'
            $adminApiToken: '%env(ADMIN_API_TOKEN)%'

    App\Service\BackupVerifyService:
        arguments:
            $databaseUrl: '%env(DATABASE_URL)%'
            $b2KeyId: '%env(BACKUP_B2_KEY_ID)%'
            $b2AppKey: '%env(BACKUP_B2_APPLICATION_KEY)%'
            $b2Bucket: '%env(BACKUP_B2_BUCKET)%'
            $b2Prefix: '%env(BACKUP_B2_REMOTE_PREFIX)%'

    App\Service\GoogleOAuthProviderInterface: '@App\Service\LeagueGoogleOAuthProvider'

    App\Service\PasswordResetService:
        arguments:
            $appBaseUrl: '%env(FRONTEND_URL)%'

    App\Security\RateLimiting\RateLimitKeyGenerator:
        arguments:
            $secret: '%kernel.secret%'

    App\Security\RateLimiting\StaffLoginRateLimiter:
        arguments:
            $globalFactory: '@limiter.staff_login_ip'
            $localFactory: '@limiter.staff_login_email_ip'

    App\Security\RateLimiting\AuthRateLimiter:
        arguments:
            $passwordResetRequestIpFactory: '@limiter.password_reset_request_ip'
            $passwordResetRequestEmailIpFactory: '@limiter.password_reset_request_email_ip'
            $passwordResetConfirmIpFactory: '@limiter.password_reset_confirm_ip'
            $passwordResetConfirmTokenIpFactory: '@limiter.password_reset_confirm_token_ip'
            $pwaOtpSendIpFactory: '@limiter.pwa_otp_send_ip'
            $pwaOtpSendEmailIpFactory: '@limiter.pwa_otp_send_email_ip'
            $pwaOtpVerifyIpFactory: '@limiter.pwa_otp_verify_ip'
            $pwaOtpVerifyEmailIpFactory: '@limiter.pwa_otp_verify_email_ip'
            $staffRegisterIpFactory: '@limiter.staff_register_ip'
            $staffRegisterEmailIpFactory: '@limiter.staff_register_email_ip'
            $googleStaffRegisterStartIpFactory: '@limiter.google_staff_register_start_ip'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

when@test:
    services:
        App\Tests\Support\TestTenantFixture:
            public: true
            autowire: true
            arguments:
                $rateLimiterCache: '@cache.rate_limiter'
