name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}
            git fetch origin
            git checkout main
            git pull origin main
            docker compose build php
            docker compose up -d
            docker compose exec -T php composer install --no-interaction --optimize-autoloader --no-dev
            docker compose exec -T php php bin/console doctrine:migrations:migrate --no-interaction
            docker compose exec -T php php bin/console cache:clear --env=prod
            docker compose exec -T php php bin/console doctrine:schema:validate --skip-sync
